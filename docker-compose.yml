services:
  chatapi:
    image: getchatapi/chatapi:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_DSN: "file:/data/chatapi.db?_journal_mode=WAL&_busy_timeout=5000"
      # Required
      JWT_SECRET: "${JWT_SECRET}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-}"

    volumes:
      - chatapi-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  chatapi-data:
